name: Build GPT Context Packet

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "GPT_CONTEXT_PACKET.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gpt-context-packet
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GPT_CONTEXT_PACKET.md (robust against ``` in source files)
        shell: bash
        run: |
          set -euo pipefail

          OUT="GPT_CONTEXT_PACKET.md"
          SHA="$(git rev-parse --short HEAD)"
          COUNT="$(git rev-list --count HEAD)"
          MSG="$(git log -1 --pretty=%s)"
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Use ~~~~ fences so embedded files can safely contain ``` without breaking the packet
          {
            echo "# DMHC Intake — GPT Context Packet"
            echo ""
            echo "**Generated:** ${DATE}  "
            echo "**Commit:** ${SHA}"
            echo "**Commit Count:** ${COUNT}"
            echo "**Branch:** ${BRANCH}"
            echo "**Last Commit:** ${MSG}"
            echo ""
            echo "## Canon / Locks"
            echo ""

            for f in \
              "CANON_DMHCI_INTAKE.md" \
              "BASELINE_SNAPSHOT.md" \
              "FIX_QUEUE.md"
            do
              if [ -f "$f" ]; then
                echo "### ${f}"
                echo ""
                echo "~~~~md"
                cat "$f"
                echo "~~~~"
                echo ""
              else
                echo "### ${f} (missing)"
                echo ""
              fi
            done

            echo "## Runtime Files"
            echo ""

            for f in "index.html" "styles.css" "app.js"; do
              if [ -f "$f" ]; then
                echo "### ${f}"
                echo ""
                case "$f" in
                  *.html) lang="html" ;;
                  *.css)  lang="css" ;;
                  *.js)   lang="js" ;;
                  *)      lang="" ;;
                esac
                echo "~~~~${lang}"
                cat "$f"
                echo "~~~~"
                echo ""
              else
                echo "### ${f} (missing)"
                echo ""
              fi
            done
          } > "$OUT"

      - name: Commit packet back to repo
        shell: bash
        run: |
          set -euo pipefail

          git add -A GPT_CONTEXT_PACKET.md

          if git diff --cached --quiet; then
            echo "No changes to GPT_CONTEXT_PACKET.md"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update GPT context packet"
          git push